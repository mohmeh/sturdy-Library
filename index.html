<!DOCTYPE html>
<html lang="en">
<head> 
<meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sturdy-Library for your books</title>
  <link rel="stylesheet" href="styles.css">
</head> 
<body>
<center><h1>Welcome to your personal book library</h1></center>
  <button id="menu-btn">Add New Book</button>
<form id="book-form" style="display: none; margin: 20px 0; padding: 15px; border: 1px solid #ccc;">
  <input type="text" id="title" placeholder="Book Title" required><br><br>
  <input type="text" id="author" placeholder="Author" required><br><br>
  <input type="number" id="pages" placeholder="Pages" required><br><br>
  <button type="submit">Submit Book</button>
</form>
   <button id="rmv-btn">Remove Book</button>
  <button id="r-status">Read Status</button>
  <div id="library-container"></div>
  
<script src="script.js"> </script>
</body>
</html>
